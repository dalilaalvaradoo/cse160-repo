<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Draw a blue rectangle (canvas version)</title>
  </head>

  <body onload="main()">
    <canvas id="example" width="400" height="400">
      Please use a browser that supports "canvas"
    </canvas>

</br>

    <!-- input boxes for v1 -->
    <label for="xCoord2">v1: </label> x</label>
    <input type="text" id="xCoord" placeholder="0">
    <label for="xCoord2"> y</label>
    <input type="text" id="yCoord" placeholder="0">

</br>

    <!-- input boxes for v2 -->
    <label for="xCoord2">v2: </label> x</label>
    <input type="number" id="xCoord2" placeholder="0">
    <label for="xCoord2"> y</label>
    <input type="number" id="yCoord2" placeholder="0">

</br>

    <!-- draw button #1 -->
    <input type="button" value="Draw" onclick="handleDrawEvent()">
</br>
    <!-- operation selector -->
    <label for="operation">Operation:</label>
    <select id="operation">
    <option value="add">Add</option>
    <option value="sub">Subtract</option>
    <option value="mul">Multiply</option>
    <option value="div">Divide</option>
    <option value="angle">Angle Between</option>
    <option value="area">Area</option>
    <option value="magnitude">Magnitude</option>
    <option value="normalize">Normalize</option>
  </select>


    <!--  scalar input -->
    <label for="scalar">Scalar:</label>
    <input type="number" id="scalar" value="1" step="any">
</br>

    <!-- draw button #2 -->
    <input type="button" value="Draw" onclick="handleDrawOperationEvent()">

    <script src="lib/cuon-matrix-cse160.js"></script>
    <script src="asg0.js"></script>
  </body>
</html>
